<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HindsightBot{% endblock %}</title>
    <meta name="description" content="An AI agent that tracks predictions and checks whether they came true.">
    <meta property="og:title" content="{% block og_title %}HindsightBot{% endblock %}">
    <meta property="og:description" content="An AI agent that tracks predictions and checks whether they came true.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{% block twitter_title %}HindsightBot{% endblock %}">
    <meta name="twitter:description" content="An AI agent that tracks predictions and checks whether they came true.">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne+Mono&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
    <style>
        :root {
            --bg-base:      #07090d;
            --bg-panel:     #0c0f16;
            --bg-elevated:  #111520;
            --bg-hover:     #161b27;
            --border:       #1e2535;
            --border-bright:#2a3449;
            --accent:       #f59e0b;
            --accent-dim:   #78490a;
            --accent-glow:  rgba(245, 158, 11, 0.12);
            --text-primary: #dde3ee;
            --text-secondary:#7a8499;
            --text-muted:   #3d4760;
            --green:        #34d399;
            --green-dim:    rgba(52, 211, 153, 0.1);
            --red:          #f87171;
            --red-dim:      rgba(248, 113, 113, 0.1);
            --blue:         #60a5fa;
            --blue-dim:     rgba(96, 165, 250, 0.1);
            --font-mono:    'JetBrains Mono', monospace;
            --font-display: 'Syne Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { font-size: 13px; background: var(--bg-base); }

        body {
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-weight: 400;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Scanline overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.03) 2px,
                rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 5px 14px;
            background: transparent;
            border: 1px solid var(--border-bright);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
        }
        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }
        .btn:active { transform: translateY(1px); }
        .btn:disabled {
            border-color: var(--text-muted);
            color: var(--text-muted);
            cursor: default;
        }
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: #fbbf24;
            border-color: #fbbf24;
            color: #000;
        }
        .btn-ghost {
            border-color: transparent;
            color: var(--text-secondary);
        }
        .btn-ghost:hover {
            border-color: var(--border-bright);
            color: var(--text-primary);
            background: var(--bg-hover);
        }
        .btn-sm {
            padding: 3px 10px;
            font-size: 10px;
        }

        /* ── Form controls ── */
        input[type="text"],
        input[type="password"],
        select,
        textarea {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 12px;
            padding: 6px 10px;
            outline: none;
            transition: border-color 0.15s ease;
            width: 100%;
        }
        input[type="text"]:focus,
        input[type="password"]:focus,
        select:focus,
        textarea:focus {
            border-color: var(--accent);
            background: var(--bg-hover);
        }
        input::placeholder,
        textarea::placeholder {
            color: var(--text-muted);
        }
        select option {
            background: var(--bg-elevated);
        }
        label {
            color: var(--text-secondary);
            font-size: 11px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* ── Status badges ── */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .badge-unresolved { background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue); }
        .badge-true       { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
        .badge-false      { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }

        /* ── Card ── */
        .card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
        }
        .card-header {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        .card-title {
            font-family: var(--font-display);
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
        }
        .card-body {
            padding: 16px;
        }

        /* ── Table ── */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .data-table thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .data-table th {
            background: var(--bg-elevated);
            color: var(--text-secondary);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-bright);
            white-space: nowrap;
        }
        .data-table td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            color: var(--text-primary);
        }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tbody tr { cursor: pointer; }
        .data-table tbody td:first-child {
            border-left: 2px solid transparent;
            transition: border-color 0.15s ease;
        }
        .data-table tbody td:last-child::after {
            content: '›';
            color: var(--text-muted);
            margin-left: 0.5rem;
        }
        .data-table tbody tr:hover td {
            background: var(--bg-elevated);
            color: var(--accent);
        }
        .data-table tbody tr:hover td.muted { color: var(--accent-dim); }
        .data-table tbody tr:hover td.id-col { color: var(--accent-dim); }
        .data-table tbody tr:hover td:first-child { border-left-color: var(--accent); }
        .data-table tbody tr:hover td:last-child::after { color: var(--accent); }
        .data-table td.muted { color: var(--text-secondary); }
        .data-table td.id-col {
            color: var(--text-muted);
            font-size: 11px;
            width: 48px;
        }

        /* ── Notification ── */
        .notify {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 11px;
            color: var(--green);
            letter-spacing: 0.04em;
        }
        .notify::before {
            content: '▸';
            color: var(--accent);
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>

[services.web.build]
builder = "NIXPACKS"
buildCommand = "uv sync && bash scripts/download_tailwind.sh && ./tailwindcss -i web/input.css -o web/static/styles.css --minify"

[services.web.deploy]
startCommand = "uvicorn web.main:app --host 0.0.0.0 --port $PORT"
preDeployCommand = "uv run alembic upgrade head"
healthcheckPath = "/health"
healthcheckTimeout = 30

[services.worker.build]
builder = "NIXPACKS"
buildCommand = "uv sync"

[services.worker.deploy]
startCommand = "uv run python worker/main.py"
